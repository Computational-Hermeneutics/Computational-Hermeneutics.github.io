<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  const LIGHT_VARS = {
    background: '#ffffff',
    primaryColor: '#ffffff',
    primaryTextColor: '#1a1a1a',
    primaryBorderColor: '#7a2e2e',
    lineColor: '#6b6b6b',
    secondaryColor: '#f1ece0',
    tertiaryColor: '#ffffff',
    clusterBkg: '#f1ece0',
    clusterBorder: '#ddd3c0',
    titleColor: '#1a1a1a',
    edgeLabelBackground: '#faf8f2',
    fontFamily: '"Source Serif 4", Georgia, serif'
  };

  const DARK_VARS = {
    background: '#14110c',
    primaryColor: '#1c1813',
    primaryTextColor: '#f1ece0',
    primaryBorderColor: '#c98989',
    lineColor: '#9a9080',
    secondaryColor: '#241f18',
    tertiaryColor: '#1c1813',
    clusterBkg: '#1c1813',
    clusterBorder: '#3a332a',
    titleColor: '#f1ece0',
    edgeLabelBackground: '#14110c',
    fontFamily: '"Source Serif 4", Georgia, serif'
  };

  const READ_LIGHT = 'classDef reading fill:#ffffff,stroke:#b8862e,color:#1a1a1a,stroke-width:1.2px';
  const COLL_LIGHT = 'classDef collation fill:#ffffff,stroke:#3563a8,color:#1a1a1a,stroke-width:1.2px';
  const READ_DARK  = 'classDef reading fill:#1c1813,stroke:#d4a84e,color:#f1ece0,stroke-width:1.2px';
  const COLL_DARK  = 'classDef collation fill:#1c1813,stroke:#6f97d6,color:#f1ece0,stroke-width:1.2px';

  function preprocess(src, theme) {
    let out = src.replace(/^\s*classDef\s+reading\s+[^\n]*$/gm, '');
    out = out.replace(/^\s*classDef\s+collation\s+[^\n]*$/gm, '');
    const readDef = theme === 'dark' ? READ_DARK : READ_LIGHT;
    const collDef = theme === 'dark' ? COLL_DARK : COLL_LIGHT;
    return out + '\n  ' + readDef + ';\n  ' + collDef + ';';
  }

  const blocks = document.querySelectorAll('.mermaid');
  blocks.forEach(b => { b.dataset.source = b.textContent; });

  async function render(theme) {
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'loose',
      theme: 'base',
      themeVariables: theme === 'dark' ? DARK_VARS : LIGHT_VARS,
      flowchart: { htmlLabels: true }
    });
    blocks.forEach(b => {
      b.innerHTML = preprocess(b.dataset.source, theme);
      b.removeAttribute('data-processed');
    });
    try {
      await mermaid.run({ nodes: Array.from(blocks) });
    } catch (e) {
      console.warn('Mermaid render error', e);
    }
  }

  const initialTheme = document.documentElement.getAttribute('data-theme') || 'light';
  render(initialTheme);

  window.__chReinitMermaid = function(theme) { render(theme); };
</script>
