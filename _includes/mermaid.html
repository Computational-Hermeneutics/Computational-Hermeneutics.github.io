<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  const LIGHT_VARS = {
    background: '#fbf6e9',
    primaryColor: '#fbf6e9',
    primaryTextColor: '#2a2118',
    primaryBorderColor: '#7c2128',
    lineColor: '#6f6149',
    secondaryColor: '#eadfc2',
    tertiaryColor: '#fbf6e9',
    clusterBkg: '#eadfc2',
    clusterBorder: '#d8c6a0',
    titleColor: '#2a2118',
    edgeLabelBackground: '#f4ecd6',
    fontFamily: '"EB Garamond", Garamond, Georgia, serif'
  };

  const DARK_VARS = {
    background: '#1a140d',
    primaryColor: '#221a11',
    primaryTextColor: '#ece0c4',
    primaryBorderColor: '#cf8a82',
    lineColor: '#a8967a',
    secondaryColor: '#2a2014',
    tertiaryColor: '#221a11',
    clusterBkg: '#221a11',
    clusterBorder: '#3a2e1d',
    titleColor: '#ece0c4',
    edgeLabelBackground: '#1a140d',
    fontFamily: '"EB Garamond", Garamond, Georgia, serif'
  };

  const READ_LIGHT = 'classDef reading fill:#fbf6e9,stroke:#9c7c34,color:#2a2118,stroke-width:1.2px';
  const COLL_LIGHT = 'classDef collation fill:#fbf6e9,stroke:#2f4a6b,color:#2a2118,stroke-width:1.2px';
  const READ_DARK  = 'classDef reading fill:#221a11,stroke:#c9a44e,color:#ece0c4,stroke-width:1.2px';
  const COLL_DARK  = 'classDef collation fill:#221a11,stroke:#88a6cc,color:#ece0c4,stroke-width:1.2px';

  function preprocess(src, theme) {
    let out = src.replace(/^\s*classDef\s+reading\s+[^\n]*$/gm, '');
    out = out.replace(/^\s*classDef\s+collation\s+[^\n]*$/gm, '');
    const readDef = theme === 'dark' ? READ_DARK : READ_LIGHT;
    const collDef = theme === 'dark' ? COLL_DARK : COLL_LIGHT;
    return out + '\n  ' + readDef + ';\n  ' + collDef + ';';
  }

  const blocks = document.querySelectorAll('.mermaid');
  blocks.forEach(b => { b.dataset.source = b.textContent; });

  async function render(theme) {
    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'loose',
      theme: 'base',
      themeVariables: theme === 'dark' ? DARK_VARS : LIGHT_VARS,
      flowchart: { htmlLabels: true }
    });
    blocks.forEach(b => {
      b.innerHTML = preprocess(b.dataset.source, theme);
      b.removeAttribute('data-processed');
    });
    try {
      await mermaid.run({ nodes: Array.from(blocks) });
    } catch (e) {
      console.warn('Mermaid render error', e);
    }
  }

  const initialTheme = document.documentElement.getAttribute('data-theme') || 'light';
  render(initialTheme);

  window.__chReinitMermaid = function(theme) { render(theme); };
</script>
