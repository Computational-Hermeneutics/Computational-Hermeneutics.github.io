<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <title>CCS Workbench</title>
  <!-- Editor frame -->
  <rect x="8" y="8" width="48" height="48" rx="4" stroke="#9c7c34" stroke-width="1.6" stroke-opacity="0.5"/>
  <!-- Gutter rule -->
  <line x1="20" y1="12" x2="20" y2="52" stroke="#9c7c34" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Lines of code -->
  <g stroke="#2a2118" stroke-width="2.4" stroke-linecap="round">
    <line x1="25" y1="18" x2="48" y2="18"/>
    <line x1="25" y1="26" x2="42" y2="26"/>
    <line x1="25" y1="34" x2="50" y2="34"/>
    <line x1="25" y1="42" x2="38" y2="42"/>
    <line x1="25" y1="50" x2="46" y2="50"/>
  </g>
  <!-- Annotation marker on the read line -->
  <circle cx="15" cy="34" r="2.6" fill="#9c7c34"/>
  <line x1="50" y1="34" x2="58" y2="34" stroke="#9c7c34" stroke-width="2.4" stroke-linecap="round"/>
</svg>
