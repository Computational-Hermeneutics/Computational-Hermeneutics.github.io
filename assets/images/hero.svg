<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <title>Computational Hermeneutics: two witnesses collated in a braid</title>

  <!-- Subtle background grid -->
  <g stroke="#e6ddc9" stroke-width="0.5">
    <path d="M 0 50 H 800 M 0 100 H 800 M 0 150 H 800 M 0 200 H 800 M 0 250 H 800 M 0 300 H 800 M 0 350 H 800"/>
    <path d="M 50 0 V 400 M 150 0 V 400 M 250 0 V 400 M 350 0 V 400 M 450 0 V 400 M 550 0 V 400 M 650 0 V 400 M 750 0 V 400"/>
  </g>

  <!-- Witness A (left column) : lines of text -->
  <g stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <line x1="120" y1="70"  x2="280" y2="70"/>
    <line x1="120" y1="110" x2="245" y2="110"/>
    <line x1="120" y1="150" x2="280" y2="150"/>
    <line x1="120" y1="190" x2="230" y2="190"/>
    <line x1="120" y1="230" x2="280" y2="230"/>
    <line x1="120" y1="270" x2="260" y2="270"/>
    <line x1="120" y1="310" x2="280" y2="310"/>
  </g>

  <!-- Witness B (right column) : lines of text, reordered -->
  <g stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" opacity="0.85">
    <line x1="520" y1="70"  x2="680" y2="70"/>
    <line x1="520" y1="110" x2="680" y2="110"/>
    <line x1="520" y1="150" x2="635" y2="150"/>
    <line x1="520" y1="190" x2="680" y2="190"/>
    <line x1="520" y1="270" x2="680" y2="270"/>
    <line x1="520" y1="310" x2="660" y2="310"/>
  </g>

  <!-- The braid : ribbons connecting matched passages across witnesses -->
  <g fill="none" stroke-linecap="round">
    <!-- match -->
    <path d="M 280 70  C 400 70,  400 70,  520 70"  stroke="#6b6b6b" stroke-width="2" opacity="0.5"/>
    <!-- substitution -->
    <path d="M 245 110 C 400 110, 400 110, 520 110" stroke="#b8862e" stroke-width="3"/>
    <!-- transposition : line 3 of A moves down in B -->
    <path d="M 280 150 C 400 150, 400 270, 520 270" stroke="#3563a8" stroke-width="4.5"/>
    <!-- transposition : line 5 of A moves up in B -->
    <path d="M 280 230 C 400 230, 400 150, 520 150" stroke="#3563a8" stroke-width="3.5"/>
    <!-- match -->
    <path d="M 230 190 C 400 190, 400 190, 520 190" stroke="#6b6b6b" stroke-width="2" opacity="0.5"/>
    <!-- substitution -->
    <path d="M 260 270 C 380 270, 380 310, 520 310" stroke="#b8862e" stroke-width="3"/>
    <!-- deletion : line 7 of A has no counterpart (terminates in the gutter) -->
    <path d="M 280 310 C 360 310, 380 350, 400 350" stroke="#7a2e2e" stroke-width="3.5"/>
  </g>

  <!-- Deletion marker in the gutter -->
  <circle cx="400" cy="350" r="4" fill="#7a2e2e"/>

  <!-- Column rules -->
  <g stroke="#b8862e" stroke-width="0.75" stroke-opacity="0.5">
    <line x1="110" y1="50" x2="110" y2="330"/>
    <line x1="690" y1="50" x2="690" y2="330"/>
  </g>
</svg>
